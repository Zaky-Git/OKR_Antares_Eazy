version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    environment:
      APP_PORT: 8080
      DB_HOST: ${DB_HOST:-detectme-api-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-okr_antares_eazy}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    ports:
      - "8181:8080"
    networks:
      - detectme-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: always
    depends_on:
      - backend
    ports:
      - "8182:80"
    networks:
      - detectme-net

networks:
  detectme-net:
    external: true
    name: backend_detectme_detectme-api-network
